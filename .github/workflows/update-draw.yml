name: Update EuroMillions Draw
 
on:
  schedule:
    - cron: '15 21 * * 2,5'
  workflow_dispatch:
 
jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
 
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
 
      - name: Create fetch script
        run: |
          cat > fetch-draw.js << 'JSEOF'
import https from 'node:https';
import fs from 'node:fs';
 
const now = new Date();
const day = String(now.getDate()).padStart(2, '0');
const month = String(now.getMonth() + 1).padStart(2, '0');
const year = now.getFullYear();
const dateStr = `${day}-${month}-${year}`;
const monthsNL = ['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];
const nlDate = `${parseInt(day)} ${monthsNL[now.getMonth()]} ${year}`;
 
console.log(`Ophalen: ${dateStr} (${nlDate})`);
 
function fetchUrl(url) {
  return new Promise((resolve, reject) => {
    https.get(url, {
      headers: {
        'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64)',
        'Accept': 'text/html',
      }
    }, (res) => {
      if (res.statusCode === 301 || res.statusCode === 302) {
        return fetchUrl(res.headers.location).then(resolve).catch(reject);
      }
      let data = '';
      res.on('data', c => data += c);
      res.on('end', () => resolve({ status: res.statusCode, body: data }));
    }).on('error', reject);
  });
}
 
function parse(html) {
  const nums = [];
  const stars = [];
  for (const m of html.matchAll(/class="[^"]*ball[^"]*">(\d+)</gi)) {
    const n = parseInt(m[1]);
    if (n >= 1 && n <= 50 && !nums.includes(n) && nums.length < 5) nums.push(n);
  }
  for (const m of html.matchAll(/class="[^"]*lucky[^"]*star[^"]*">(\d+)</gi)) {
    const s = parseInt(m[1]);
    if (s >= 1 && s <= 12 && !stars.includes(s) && stars.length < 2) stars.push(s);
  }
  if (stars.length < 2) {
    for (const m of html.matchAll(/class="[^"]*star[^"]*">(\d+)</gi)) {
      const s = parseInt(m[1]);
      if (s >= 1 && s <= 12 && !stars.includes(s) && stars.length < 2) stars.push(s);
    }
  }
  const machineM = html.match(/[Mm]achine[:\s#]*(\d+)/);
  const balM = html.match(/[Bb]all?\s*[Ss]et[:\s]*(\d+)/i);
  const drawM = html.match(/[Dd]raw[:\s#]*([0-9,]+)/);
  return {
    nums: nums.sort((a,b)=>a-b),
    stars: stars.sort((a,b)=>a-b),
    machine: machineM ? parseInt(machineM[1]) : 0,
    bal: balM ? parseInt(balM[1]) : 0,
    drawNum: drawM ? parseInt(drawM[1].replace(',','')) : 0
  };
}
 
try {
  const r = await fetchUrl(`https://www.euro-millions.com/results/${dateStr}`);
  console.log(`Status: ${r.status}`);
  if (r.status !== 200) { console.log('Niet beschikbaar'); process.exit(0); }
 
  const d = parse(r.body);
  console.log('Data:', JSON.stringify(d));
 
  if (d.nums.length !== 5 || d.stars.length !== 2) {
    console.log('Onvoldoende data — overslaan');
    process.exit(0);
  }
 
  let dataJs = fs.readFileSync('js/data.js', 'utf8');
  if (dataJs.includes(`'${nlDate}'`)) {
    console.log(`${nlDate} al aanwezig`);
    process.exit(0);
  }
 
  const entry = `  { date:'${nlDate}', draw:${d.drawNum}, nums:[${d.nums}], stars:[${d.stars}], machine:${d.machine}, bal:${d.bal} },`;
  dataJs = dataJs.replace('let ALL_DRAWS = [', `let ALL_DRAWS = [\n${entry}`);
  fs.writeFileSync('js/data.js', dataJs);
  fs.writeFileSync('/tmp/draw_info.json', JSON.stringify({ date:nlDate, isoDate:`${year}-${month}-${day}`, nums:d.nums, stars:d.stars, machine:d.machine, bal:d.bal }));
  fs.writeFileSync('/tmp/new_draw.txt', 'true');
  console.log(`✓ ${nlDate} toegevoegd`);
} catch(e) {
  console.error('Fout:', e.message);
  process.exit(1);
}
JSEOF
 
      - name: Run fetch script
        run: node --input-type=module < fetch-draw.js
 
      - name: Commit dataset
        run: |
          git config --global user.name 'PickMyNumbers Bot'
          git config --global user.email 'bot@pickmynumbers.eu'
          git add js/data.js
          if git diff --staged --quiet; then
            echo "Geen wijzigingen"
          else
            git commit -m "Auto: trekking $(date +'%d %b %Y') toegevoegd"
            git push
          fi
 
      - name: Send emails
        run: |
          if [ -f /tmp/new_draw.txt ]; then
            curl -s -X POST \
              "https://bcdzusstvnsikkhdmjqn.supabase.co/functions/v1/rapid-processor" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
              -d "$(cat /tmp/draw_info.json)"
          fi
