name: Update EuroMillions Draw

on:
  schedule:
    - cron: '30 20 * * 2,5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Fetch latest draw
        run: node scripts/fetch-draw.mjs

      - name: Commit dataset
        run: |
          git config user.name 'PickMyNumbers Bot'
          git config user.email 'bot@pickmynumbers.eu'
          git add js/data.js
          if git diff --staged --quiet; then
            echo "Geen wijzigingen"
          else
            git commit -m "Auto: trekking toegevoegd $(date +'%d %b %Y')"
            git push origin main
          fi

      - name: Send analysis emails
        run: |
          if [ -f /tmp/new_draw.txt ] && [ -f /tmp/draw_info.json ]; then
            DRAW_INFO=$(cat /tmp/draw_info.json)
            echo "Emails sturen voor: $DRAW_INFO"
            curl -s -X POST \
              "https://bcdzusstvnsikkhdmjqn.supabase.co/functions/v1/rapid-processor" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
              -d "$DRAW_INFO"
            echo "Emails verstuurd"
          else
            echo "Geen nieuwe trekking"
          fi
