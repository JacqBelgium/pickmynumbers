
name: Update EuroMillions Draw
 
on:
  schedule:
    # Elke dinsdag en vrijdag om 22:15 CET (21:15 UTC)
    - cron: '15 21 * * 2,5'
  workflow_dispatch:  # Handmatig starten mogelijk
 
jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
 
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
 
      - name: Fetch latest draw and update dataset
        id: fetch
        run: |
          cat > /tmp/fetch-draw.mjs << 'SCRIPT'
          import { get } from 'node:https';
          import { readFileSync, writeFileSync, existsSync } from 'node:fs';
 
          const now = new Date();
          const day = String(now.getDate()).padStart(2, '0');
          const month = String(now.getMonth() + 1).padStart(2, '0');
          const year = now.getFullYear();
          const dateStr = `${day}-${month}-${year}`;
          
          const monthsNL = ['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];
          const nlDate = `${parseInt(day)} ${monthsNL[now.getMonth()]} ${year}`;
 
          console.log(`Ophalen trekking voor: ${dateStr} (${nlDate})`);
 
          function fetchUrl(url) {
            return new Promise((resolve, reject) => {
              const options = {
                headers: {
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0.0.0',
                  'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8',
                  'Accept-Language': 'en-GB,en;q=0.9,nl;q=0.8',
                }
              };
              get(url, options, (res) => {
                if (res.statusCode === 301 || res.statusCode === 302) {
                  return fetchUrl(res.headers.location).then(resolve).catch(reject);
                }
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => resolve({ status: res.statusCode, body: data }));
              }).on('error', reject);
            });
          }
 
          function parseDrawData(html) {
            const nums = [];
            const stars = [];
 
            // Probeer diverse patronen voor nummers
            const patterns = [
              /class="[^"]*ball[^"]*">(\d+)</gi,
              /winning-number[^>]*>(\d+)</gi,
              /<li[^>]*class="[^"]*ball[^"]*"[^>]*>(\d+)/gi,
            ];
 
            for (const pattern of patterns) {
              if (nums.length >= 5) break;
              const matches = [...html.matchAll(pattern)];
              for (const m of matches) {
                const n = parseInt(m[1]);
                if (n >= 1 && n <= 50 && !nums.includes(n) && nums.length < 5) nums.push(n);
              }
            }
 
            // Sterren
            const starPatterns = [
              /class="[^"]*lucky[^"]*">(\d+)</gi,
              /class="[^"]*star[^"]*">(\d+)</gi,
              /lucky-star[^>]*>(\d+)</gi,
            ];
            for (const pattern of starPatterns) {
              if (stars.length >= 2) break;
              const matches = [...html.matchAll(pattern)];
              for (const m of matches) {
                const s = parseInt(m[1]);
                if (s >= 1 && s <= 12 && !stars.includes(s) && stars.length < 2) stars.push(s);
              }
            }
 
            // Machine en balset
            const machineMatch = html.match(/[Mm]achine[:\s#]*(\d+)/) ||
                                 html.match(/Ball Machine[:\s]*(\d+)/i);
            const ballMatch = html.match(/Ball Set[:\s]*(\d+)/i) ||
                              html.match(/[Bb]al(?:set)?[:\s]*(\d+)/);
            const drawMatch = html.match(/[Dd]raw[:\s#]*([0-9,]+)/) ||
                              html.match(/draw-number[^>]*>([0-9,]+)/i);
 
            return {
              nums: nums.sort((a,b) => a-b),
              stars: stars.sort((a,b) => a-b),
              machine: machineMatch ? parseInt(machineMatch[1]) : 0,
              bal: ballMatch ? parseInt(ballMatch[1]) : 0,
              drawNum: drawMatch ? parseInt(drawMatch[1].replace(',','')) : 0
            };
          }
 
          try {
            const url = `https://www.euro-millions.com/results/${dateStr}`;
            console.log(`Ophalen: ${url}`);
            const result = await fetchUrl(url);
            console.log(`HTTP status: ${result.status}`);
            
            if (result.status !== 200) {
              console.log('Pagina niet beschikbaar — trekking mogelijk nog niet gepubliceerd');
              process.exit(0);
            }
 
            const data = parseDrawData(result.body);
            console.log('Geparseerde data:', JSON.stringify(data));
 
            if (data.nums.length !== 5 || data.stars.length !== 2) {
              console.log(`Onvoldoende data: ${data.nums.length} nummers, ${data.stars.length} sterren — overslaan`);
              process.exit(0);
            }
 
            let dataJs = readFileSync('js/data.js', 'utf8');
            
            if (dataJs.includes(`'${nlDate}'`)) {
              console.log(`Trekking ${nlDate} al aanwezig`);
              process.exit(0);
            }
 
            const newEntry = `  { date:'${nlDate}', draw:${data.drawNum}, nums:[${data.nums.join(',')}], stars:[${data.stars.join(',')}], machine:${data.machine}, bal:${data.bal} },`;
            dataJs = dataJs.replace('let ALL_DRAWS = [', `let ALL_DRAWS = [\n${newEntry}`);
            writeFileSync('js/data.js', dataJs);
 
            console.log(`✓ Toegevoegd: ${nlDate} — ${data.nums.join('-')} + ★${data.stars.join('-')} M${data.machine}/B${data.bal}`);
            
            writeFileSync('/tmp/draw_info.json', JSON.stringify({
              date: nlDate,
              isoDate: `${year}-${month}-${day}`,
              nums: data.nums,
              stars: data.stars,
              machine: data.machine,
              bal: data.bal,
              drawNum: data.drawNum
            }));
 
            writeFileSync('/tmp/committed.txt', 'true');
 
          } catch(e) {
            console.error('Fout:', e.message);
            process.exit(1);
          }
          SCRIPT
          node /tmp/fetch-draw.mjs
 
      - name: Commit updated dataset
        run: |
          git config --global user.name 'PickMyNumbers Bot'
          git config --global user.email 'bot@pickmynumbers.eu'
          git add js/data.js
          if git diff --staged --quiet; then
            echo "Geen wijzigingen"
          else
            git commit -m "Auto: trekking $(date +'%d %b %Y') toegevoegd"
            git push
          fi
 
      - name: Send analysis emails
        run: |
          if [ -f /tmp/committed.txt ] && [ -f /tmp/draw_info.json ]; then
            DRAW_INFO=$(cat /tmp/draw_info.json)
            echo "Emails sturen voor: $DRAW_INFO"
            curl -s -X POST \
              "https://bcdzusstvnsikkhdmjqn.supabase.co/functions/v1/rapid-processor" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
              -d "$DRAW_INFO"
          else
            echo "Geen nieuwe trekking — geen emails"
          fi
