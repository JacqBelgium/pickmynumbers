name: Update EuroMillions Draw

on:
  schedule:
    - cron: '15 21 * * 2,5'
  workflow_dispatch:

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Fetch latest draw
        run: node scripts/fetch-draw.mjs

      - name: Commit dataset
        run: |
          git config --global user.name 'PickMyNumbers Bot'
          git config --global user.email 'bot@pickmynumbers.eu'
          git add js/data.js
          if git diff --staged --quiet; then
            echo "Geen wijzigingen"
          else
            git commit -m "Auto: trekking toegevoegd $(date +'%d %b %Y')"
            git push
          fi

      - name: Send analysis emails
        run: |
          if [ -f /tmp/new_draw.txt ]; then
            curl -s -X POST \
              "https://bcdzusstvnsikkhdmjqn.supabase.co/functions/v1/rapid-processor" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
              -d "$(cat /tmp/draw_info.json)"
            echo "Emails verstuurd"
          else
            echo "Geen nieuwe trekking"
          fi
