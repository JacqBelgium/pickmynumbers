name: Update EuroMillions Draws

on:
  schedule:
    - cron: '0 23 * * 2'
    - cron: '0 23 * * 5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PERSONAL_TOKEN }}

      - name: Fetch latest draw
        run: |
          python3 - << 'PYEOF'
          import urllib.request
          import re
          import json
          import os
          from datetime import datetime

          headers = {
            'User-Agent': 'Mozilla/5.0 (X11; Linux x86_64; rv:109.0) Gecko/20100101 Firefox/115.0',
            'Accept': 'text/html,application/xhtml+xml',
            'Accept-Language': 'en-GB,en;q=0.5',
          }

          MONTHS_NL = ['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec']

          draw = None

          try:
            req = urllib.request.Request(
              'https://www.national-lottery.co.uk/results/euromillions/draw-history/xml',
              headers=headers
            )
            with urllib.request.urlopen(req, timeout=15) as resp:
              xml = resp.read().decode('utf-8', errors='ignore')

            dates = re.findall(r'<drawDate>(\d{4}-\d{2}-\d{2})</drawDate>', xml)
            machines = re.findall(r'<ballMachine>(.*?)</ballMachine>', xml)
            ballsets = re.findall(r'<ballSet>(\d+)</ballSet>', xml)

            ball_blocks = re.findall(r'<ball\d+>(\d+)</ball\d+>', xml)
            star_blocks = re.findall(r'<luckystar\d+>(\d+)</luckystar\d+>', xml, re.IGNORECASE)

            if dates and len(ball_blocks) >= 5 and len(star_blocks) >= 2:
              d = datetime.strptime(dates[0], '%Y-%m-%d')
              date_nl = f"{d.day} {MONTHS_NL[d.month-1]} {d.year}"
              nums = sorted([int(x) for x in ball_blocks[:5]])
              stars = sorted([int(x) for x in star_blocks[:2]])
              machine_raw = machines[0] if machines else '13'
              m_num = re.search(r'(\d+)', machine_raw)
              machine = int(m_num.group(1)) if m_num else 13
              bal = int(ballsets[0]) if ballsets else 21
              draw = {'date': date_nl, 'nums': nums, 'stars': stars, 'machine': machine, 'bal': bal}
              print(f"Opgehaald: {date_nl} {nums} + {stars} M{machine}/B{bal}")
          except Exception as e:
            print(f"Fout: {e}")

          if not draw:
            print("Geen data opgehaald")
            exit(0)

          draws_file = 'draws.json'
          existing = []
          if os.path.exists(draws_file):
            with open(draws_file, 'r') as f:
              existing = json.load(f)

          if any(d['date'] == draw['date'] for d in existing):
            print(f"Al aanwezig: {draw['date']}")
            exit(0)

          existing.insert(0, draw)
          with open(draws_file, 'w') as f:
            json.dump(existing, f, ensure_ascii=False, indent=2)

          print(f"Opgeslagen! Totaal: {len(existing)}")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.PERSONAL_TOKEN }}@github.com/JacqBelgium/pickmynumbers.git
          git add draws.json
          git diff --staged --quiet || git commit -m "Auto-update: EuroMillions $(date +%Y-%m-%d)"
          git push
